<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>The Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: sans-serif;
      overflow: hidden;
      height: 100%;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    .slider {
      width: 900px;
      height: 500px;
      position: relative;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      background: black;
      align-items: center;
    }

    .card.active {
      display: flex;
    }

    /* label kiri */
    .episode-side {
      width: 120px;
      height: 100%;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      letter-spacing: 2px;
    }

    /* video */
    .video-container {
      flex: 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }

    /* tombol navigasi */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 30px;
      padding: 15px;
      cursor: pointer;
      z-index: 999;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    .nav-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    @media screen and (min-width: 900px) {
      .slider {
        width: 1200px;
        height: 650px;
      }

      .episode-side {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <button class="nav-btn prev">←</button>
  <button class="nav-btn next">→</button>

  <div class="slider">

    <div class="card active">
      <div class="episode-side">EPS 1</div>
      <div class="video-container">
        <iframe src="https://drive.google.com/file/d/1u_zrx6ScaXm3f99L35ecOA_0sQcLfWob/preview" allow="autoplay" allowfullscreen></iframe>

    </div>

    <div class="card">

      </div>
    </div>

    <div class="card">
      <div class="episode-side">EPS 3</div>
      <div class="video-container">
        <iframe src="https://drive.google.com/file/d/1NGB73LF2pBiUIk1b9zkIpo0G17QSQrk-/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
    </div>

    <div class="card">
      <div class="episode-side">EPS 4</div>

      </div>
    </div>

    <div class="card">
      <div class="episode-side">EPS 6</div>

        <iframe src="https://drive.google.com/file/d/1YzD9n-SqY_GinD7DoX4Ci_-IuHjiRk9n/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
    </div>

    <div class="card">
      <div class="episode-side">EPS 7</div>
      <div class="video-container">
        <iframe src="https://drive.google.com/file/d/1C1q5GBYySY2Hsdp_lsGxvbsfvZIb6uzw/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
    </div>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.card');
let index = 0;

function showCard(i) {
  cards.forEach(card => {
    const iframe = card.querySelector('iframe');

    card.classList.remove('active');

    // reset iframe biar video stop
    if (iframe) {
      const src = iframe.src;
      iframe.src = src;
    }
  });

  cards[i].classList.add('active');
}

document.querySelector('.next').onclick = () => {
  index = (index + 1) % cards.length;
  showCard(index);
};

document.querySelector('.prev').onclick = () => {
  index = (index - 1 + cards.length) % cards.length;
  showCard(index);
};
</script>

</body>
</html>
