<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>The Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: sans-serif;
      overflow: hidden;
      height: 100%;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    .slider {
      width: 500px;
      height: 566px;
      position: relative;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      background: black;

      display: flex; /* penting */
    }

    .card.active {
      display: flex;
    }

    /* video area */
    .video-container {
      width: 75%;
      height: 100%;
      position: relative;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* sidebar episode */
    .episode-side {
      width: 25%;
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      letter-spacing: 2px;
    }

    /* tombol play */
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 40px;
      padding: 15px 25px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 20;
    }

    /* tombol navigasi */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 30px;
      padding: 15px;
      cursor: pointer;
      z-index: 50;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    .nav-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    @media screen and (min-width: 900px) {
      .slider {
        width: 1000px;
        height: 1123px;
      }

      .episode-side {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <button class="nav-btn prev">←</button>
  <button class="nav-btn next">→</button>

  <div class="slider">

    <!-- CARD -->
    <div class="card active video-card">
      <div class="video-container">
        <video src="TheCard1.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 1</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="TheCard2.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 2</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="TheCard3.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 3</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="TheCard5.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 4</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="tobecon.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 5</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="TheCard5.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 6</div>
    </div>

    <div class="card video-card">
      <div class="video-container">
        <video src="tobecon.mp4"></video>
        <button class="play-btn">▶</button>
      </div>
      <div class="episode-side">EPS 7</div>
    </div>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.card');
let index = 0;

function showCard(i) {
  cards.forEach(card => {
    const video = card.querySelector('video');
    const btn = card.querySelector('.play-btn');

    card.classList.remove('active');

    if (video) {
      video.pause();
      video.currentTime = 0;
    }
    if (btn) btn.style.display = 'block';
  });

  cards[i].classList.add('active');
}

document.querySelector('.next').onclick = () => {
  index = (index + 1) % cards.length;
  showCard(index);
};

document.querySelector('.prev').onclick = () => {
  index = (index - 1 + cards.length) % cards.length;
  showCard(index);
};

document.querySelectorAll('.video-card').forEach(card => {
  const video = card.querySelector('video');
  const btn = card.querySelector('.play-btn');

  btn.addEventListener('click', () => {
    video.play();
    btn.style.display = 'none';
  });

  video.addEventListener('ended', () => {
    btn.style.display = 'block';
  });
});
</script>

</body>
</html>
