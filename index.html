```html
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>The Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: sans-serif;
      overflow: hidden;
      height: 100%;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    .slider {
      width: 400px;
      height: 566px;
      position: relative;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      background: black;
    }

    .card.active {
      display: block;
    }

    .card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* tombol play */
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 48px;
      padding: 20px 30px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 20;
    }

    /* tombol navigasi */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 30px;
      padding: 15px;
      cursor: pointer;
      z-index: 50;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .prev {
      left: 20px;
    }

    .next {
      right: 20px;
    }

    /* link cards */
    .link-card {
      background-size: cover;
      background-position: center;
    }

    .overlay-btn {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    @media screen and (min-width: 900px) {
      .slider {
        width: 794px;
        height: 1123px;
      }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <button class="nav-btn prev">←</button>
  <button class="nav-btn next">→</button>

  <div class="slider">

    <!-- VIDEO CARDS -->
    <div class="card active video-card">
      <video src="TheCard1.mp4"></video>
      <button class="play-btn">▶</button>
    </div>

    <div class="card video-card">
      <video src="TheCard2.mp4"></video>
      <button class="play-btn">▶</button>
    </div>

    <div class="card video-card">
      <video src="TheCard3.mp4"></video>
      <button class="play-btn">▶</button>
    </div>

    <div class="card video-card">
      <video src="TheCard5.mp4"></video>
      <button class="play-btn">▶</button>
    </div>

    <div class="card video-card">
      <video src="tobecon.mp4"></video>
      <button class="play-btn">▶</button>
    </div>

    <!-- LINK CARDS -->
    <div class="card link-card" style="background-image:url('FiverrCard.png')">
      <button class="overlay-btn"
        onclick="window.open('https://www.fiverr.com/s/99oGPL0','_blank')"></button>
    </div>

    <div class="card link-card" style="background-image:url('InstaCard.png')">
      <button class="overlay-btn"
        onclick="window.open('https://www.instagram.com/rottenchunk_/','_blank')"></button>
    </div>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.card');
let index = 0;

function showCard(i) {
  cards.forEach(card => {
    const video = card.querySelector('video');
    const btn = card.querySelector('.play-btn');

    card.classList.remove('active');

    if (video) {
      video.pause();
      video.currentTime = 0;
    }
    if (btn) btn.style.display = 'block';
  });

  cards[i].classList.add('active');
}

document.querySelector('.next').onclick = () => {
  index = (index + 1) % cards.length;
  showCard(index);
};

document.querySelector('.prev').onclick = () => {
  index = (index - 1 + cards.length) % cards.length;
  showCard(index);
};

// play button logic
document.querySelectorAll('.video-card').forEach(card => {
  const video = card.querySelector('video');
  const btn = card.querySelector('.play-btn');

  btn.addEventListener('click', () => {
    video.play();
    btn.style.display = 'none';
  });

  video.addEventListener('ended', () => {
    btn.style.display = 'block';
  });
});
</script>

</body>
</html>
```
